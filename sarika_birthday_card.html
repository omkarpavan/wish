
<style>
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-12px); }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(620px) rotate(720deg); opacity: 0; }
  }
  @keyframes sparkle {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: 1; transform: scale(1.2); }
  }
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }
  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }

  .card-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    background: linear-gradient(135deg, #ff9de2 0%, #ffb347 50%, #ff6b6b 100%);
    position: relative;
    overflow: hidden;
  }

  .confetti-piece {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    animation: confettiFall linear infinite;
    pointer-events: none;
  }

  .card {
    background: #fff;
    border-radius: 28px;
    padding: 2.5rem 2rem 2rem;
    max-width: 420px;
    width: 100%;
    text-align: center;
    position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    animation: fadeIn 0.8s ease both;
  }

  .cake-wrap {
    animation: float 3s ease-in-out infinite;
    font-size: 72px;
    line-height: 1;
    margin-bottom: 0.5rem;
    display: block;
  }

  .name-tag {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #f06292;
    margin-bottom: 0.5rem;
    animation: fadeIn 1s ease 0.2s both;
  }

  .big-name {
    font-size: 48px;
    font-weight: 700;
    background: linear-gradient(90deg, #ff5f96, #ff9a3c, #ff5f96);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 2.5s linear infinite, fadeIn 1s ease 0.4s both;
    margin: 0 0 0.25rem;
    line-height: 1.1;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    justify-content: center;
    margin: 1rem 0;
    animation: fadeIn 1s ease 0.6s both;
  }
  .divider span { font-size: 18px; animation: sparkle 1.5s ease-in-out infinite; }
  .divider span:nth-child(2) { animation-delay: 0.3s; }
  .divider span:nth-child(3) { animation-delay: 0.6s; }
  .divider-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, #ffb6c1, transparent); }

  .wish-text {
    font-size: 16px;
    line-height: 1.8;
    color: #555;
    margin: 0 0 1.5rem;
    animation: fadeIn 1s ease 0.8s both;
  }
  .wish-text strong { color: #e91e8c; }

  .hearts-row {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 1.5rem;
    animation: fadeIn 1s ease 1s both;
  }
  .heart {
    font-size: 22px;
    animation: heartbeat 1.2s ease-in-out infinite;
  }
  .heart:nth-child(2) { animation-delay: 0.2s; }
  .heart:nth-child(3) { animation-delay: 0.4s; }
  .heart:nth-child(4) { animation-delay: 0.6s; }
  .heart:nth-child(5) { animation-delay: 0.8s; }

  .balloon-row {
    display: flex;
    justify-content: center;
    gap: 6px;
    font-size: 32px;
    animation: fadeIn 1s ease 1.2s both;
    margin-bottom: 1.5rem;
  }
  .balloon-row span:nth-child(1) { animation: float 2.5s ease-in-out infinite; }
  .balloon-row span:nth-child(2) { animation: float 2.8s ease-in-out 0.3s infinite; }
  .balloon-row span:nth-child(3) { animation: float 2.3s ease-in-out 0.6s infinite; }
  .balloon-row span:nth-child(4) { animation: float 2.6s ease-in-out 0.9s infinite; }
  .balloon-row span:nth-child(5) { animation: float 2.4s ease-in-out 0.15s infinite; }

  .footer-msg {
    font-size: 13px;
    color: #aaa;
    animation: fadeIn 1s ease 1.4s both;
  }

  .sparkle-corner {
    position: absolute;
    font-size: 20px;
    animation: sparkle 2s ease-in-out infinite;
  }
  .sc1 { top: 14px; left: 18px; animation-delay: 0s; }
  .sc2 { top: 14px; right: 18px; animation-delay: 0.5s; }
  .sc3 { bottom: 14px; left: 18px; animation-delay: 1s; }
  .sc4 { bottom: 14px; right: 18px; animation-delay: 1.5s; }
</style>

<div class="card-wrap" id="wrap">
  <div class="card">
    <span class="sparkle-corner sc1">✨</span>
    <span class="sparkle-corner sc2">🌟</span>
    <span class="sparkle-corner sc3">💫</span>
    <span class="sparkle-corner sc4">✨</span>

    <span class="cake-wrap">🎂</span>

    <p class="name-tag">Happy Birthday</p>
    <h1 class="big-name">Sarika</h1>

    <div class="divider">
      <div class="divider-line"></div>
      <span>🎉</span>
      <span>🎊</span>
      <span>🎁</span>
      <div class="divider-line"></div>
    </div>

    <p class="wish-text">
      Wishing you a day as <strong>bright and beautiful</strong> as you are!<br>
      May this special day bring you endless <strong>joy, laughter</strong>,<br>
      and all the happiness your heart can hold. 🌸<br><br>
      Here's to you, <strong>Sarika</strong> — you deserve the world! 🌍
    </p>

    <div class="hearts-row">
      <span class="heart">❤️</span>
      <span class="heart">🧡</span>
      <span class="heart">💛</span>
      <span class="heart">💚</span>
      <span class="heart">💜</span>
    </div>

    <div class="balloon-row">
      <span>🎈</span>
      <span>🎈</span>
      <span>🎈</span>
      <span>🎈</span>
      <span>🎈</span>
    </div>

    <p class="footer-msg">With love & best wishes 💖</p>
  </div>
</div>

<script>
  const colors = ['#ff5f96','#ff9a3c','#ffe040','#69f0ae','#40c4ff','#ea80fc','#ff6d00'];
  const shapes = ['circle','square','triangle'];
  const wrap = document.getElementById('wrap');
  for (let i = 0; i < 38; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const color = colors[Math.floor(Math.random()*colors.length)];
    const size = 7 + Math.random()*8;
    const left = Math.random()*100;
    const dur = 3 + Math.random()*4;
    const delay = Math.random()*4;
    const isCircle = Math.random() > 0.5;
    el.style.cssText = `
      left:${left}%;
      top:-20px;
      width:${size}px;
      height:${size}px;
      background:${color};
      border-radius:${isCircle?'50%':'3px'};
      animation-duration:${dur}s;
      animation-delay:${delay}s;
    `;
    wrap.appendChild(el);
  }
</script>
